apiVersion: 1
datasources:
  - name: 'elm-csv'
    uid: 'elm-csv'
    type: 'marcusolsson-csv-datasource'
    access: proxy
    isDefault: true
    url: '/data/plots'
    jsonData:
      storage: local
      allowLocalMode: true
  - name: 'elm-logs'
    uid: 'elm-logs'
    type: 'marcusolsson-csv-datasource'
    access: proxy
    isDefault: false
    url: '/data/logs'
    jsonData:
      storage: local
      allowLocalMode: true
